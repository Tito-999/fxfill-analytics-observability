# FxFill Analytics — Logging Configuration

version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"
  json:
    format: '{"time": "%(asctime)s", "level": "%(levelname)s", "logger": "%(name)s", "message": "%(message)s"}'
    datefmt: "%Y-%m-%dT%H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout
  file:
    class: logging.handlers.RotatingFileHandler
    level: DEBUG
    formatter: json
    filename: logs/fxfill.log
    maxBytes: 10485760
    backupCount: 5
    encoding: utf-8

loggers:
  fxfill_analytics:
    level: DEBUG
    handlers: [console, file]
    propagate: false
  dbt:
    level: INFO
    handlers: [console]
    propagate: false

root:
  level: INFO
  handlers: [console]
